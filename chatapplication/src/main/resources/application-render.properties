# Render-specific overrides
# All secrets come from Render Environment Variables (sync: false in render.yaml)
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
jwt.secret=${JWT_SECRET:defaultSecretKeyForRenderMustBeOver32Chars}
chat.encryption.key=${CHAT_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
