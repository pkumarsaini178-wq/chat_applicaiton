spring.application.name=chatapplication

server.address=0.0.0.0

# --- Mail Configuration ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Database ---
# Render: set DB_URL, DB_USERNAME, DB_PASSWORD via Environment Variables
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/chatapplication;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update

# --- JWT ---
jwt.secret=${JWT_SECRET:defaultDevSecretChangeInProduction}
jwt.expiry=604800000

# --- File Upload ---
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# --- Encryption ---
chat.encryption.key=${CHAT_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

# --- DevTools & LiveReload configuration for fast development reloading ---
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.web.resources.cache.period=0

