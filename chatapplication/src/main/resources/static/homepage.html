<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>

    <link rel="stylesheet" href="theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .tick { font-size: 13px; margin-left: 4px; vertical-align: middle; }
        .tick.sent { color: var(--text-muted); }
        .tick.delivered { color: var(--text-muted); }
        .tick.read { color: #3ecf8e; }
        .settings-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            width: auto;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .settings-btn:hover {
            background: var(--bg-color);
            transform: none;
        }
        .settings-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px;
            width: 180px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .settings-menu button {
            width: 100%;
            margin-bottom: 2px;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-menu button:hover {
            background: var(--bg-color);
            transform: none;
        }
        .settings-menu .danger-btn {
            color: var(--danger);
        }
        .settings-menu .danger-btn:hover {
            background: var(--danger-light);
        }
        .media-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            padding: 0;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .media-btn:hover {
            background: var(--bg-color);
            border-color: var(--text-muted);
            transform: none;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            animation: fadeInUp 0.5s ease;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state p {
            font-size: 15px;
        }
        .typing-indicator {
            display: none;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            animation: fadeInUp 0.3s ease;
        }
        .typing-indicator span {
            display: inline-block;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        .chat-msg {
            animation: fadeInUp 0.3s ease;
        }
        .user {
            transition: all 0.2s ease;
        }
        .user:active {
            transform: scale(0.97);
        }
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--whatsapp-green);
            border: 2px solid var(--card-bg);
            position: absolute;
            bottom: 0;
            right: 0;
            display: none;
        }
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-right: 12px;
            flex-shrink: 0;
        }
        #chatMessage:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 106, 191, 0.15);
        }
        .nav-greeting {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--danger-light);
            color: var(--danger);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            width: auto;
            align-self: center;
        }
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 118, 117, 0.25);
        }
        .logout-btn:active {
            transform: translateY(0);
        }
        .logout-btn svg {
            flex-shrink: 0;
        }
        @media (max-width: 768px) {
            .empty-state .icon { font-size: 48px; }
            .search-toggle-btn { display: flex !important; }
            .search-box .search-toggle-btn {
                background: none; border: none; font-size: 18px; cursor: pointer;
                color: var(--text-secondary); padding: 6px; border-radius: 50%; width: 36px; height: 36px;
                align-items: center; justify-content: center; transition: all 0.2s;
            }
            .search-box .search-toggle-btn:hover {
                background: var(--bg-color); transform: none;
            }
            .search-box.mobile-expanded input { display: block !important; }
            .search-box.mobile-expanded .search-toggle-btn { display: none !important; }
            .search-box input { display: none; }
            .search-box.mobile-expanded {
                position: fixed; top: 8px; left: 8px; right: 8px; z-index: 1000;
                background: var(--card-bg); padding: 8px; border-radius: var(--radius-md);
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            }
            .search-box.mobile-expanded input {
                width: 100%; margin: 0; font-size: 16px;
            }
            .notifications a svg { width: 26px; height: 26px; }
            .logout-btn {
                padding: 8px;
                border-radius: 50%;
            }
            .logout-btn span {
                display: none;
            }
        }
        /* Fullscreen Image Viewer Modal Styles */
        .image-viewer-modal {
            display: none;
            position: fixed;
            z-index: 20000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .image-viewer-modal.show {
            opacity: 1;
        }
        .image-viewer-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: var(--radius-sm);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: zoom-out;
        }
        .image-viewer-modal.show img {
            transform: scale(1);
        }
        .chat-msg img {
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chat-msg img:hover {
            transform: scale(1.02);
            box-shadow: var(--card-shadow);
        }
        .chat-msg {
            cursor: pointer;
            position: relative;
        }
        @keyframes menuPopIn {
            from { opacity: 0; transform: scale(0.95) translateY(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .msg-menu-trigger {
            display: none;
            position: absolute;
            bottom: 4px;
            right: 4px;
            font-size: 16px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
            z-index: 10;
            transition: background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .msg-menu-trigger:hover {
            background: var(--bg-color);
        }
        @media (max-width: 768px) {
            .msg-menu-trigger {
                display: block;
            }
            .chat-msg {
                cursor: default;
            }
        }
    </style>


</head>

<body class="homepage-layout">

    <!-- Navbar -->
    <div class="navbar">
        <div class="user-name" id="currentUserName">
            Loading...
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="notifications" style="position: relative;">
                <a href="notifications.html" style="text-decoration: none; color: inherit; position: relative; display: flex;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary);">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="notifBadge"
                        style="background:var(--primary-gradient); color:white; border-radius:50%; padding:0; width:20px; height:20px; font-size:10px; display:none; position:absolute; top:-8px; right:-10px; line-height:20px; text-align:center; font-weight:700; border:2px solid var(--navbar-bg);">0</span>
                </a>
            </div>

            <div class="search-box">
                <button id="mobileSearchToggle" class="search-toggle-btn" onclick="toggleMobileSearch()" style="display:none;">&#128269;</button>
                <input type="text" id="navbarSearchInput" placeholder="Search users..." onkeyup="navbarSearchUser()">
            </div>

            <div id="profileBtn" onclick="openProfileModal()" style="width: 38px; height: 38px; border-radius: 50%; background: var(--primary-gradient); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2); transition: transform 0.2s;" title="My Profile">
                U
            </div>
        </div>
    </div>

    <div class="main">

        <!-- Left Panel -->
        <div class="left-panel">
            <div class="tabs-container">
                <button onclick="showTab('users')" id="btnTabUsers" class="tab-btn active">All Users</button>
                <button onclick="showTab('friends')" id="btnTabFriends" class="tab-btn">Friends</button>
            </div>

            <div id="usersTab">
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="searchUser()">
                </div>
                <div class="user-list" id="userList">
                    <!-- Users will be populated dynamically from server -->
                </div>
            </div>

            <div id="friendsTab" style="display:none;">
                <div class="user-list" id="friendList">
                    <!-- Friends will be populated dynamically from server -->
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel" id="chatPanel">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding:16px 20px; background: var(--card-bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0;">
                <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:0;">
                    <button onclick="backToContacts()" class="back-to-contacts">&#8592;</button>
                    <h2 id="chatHeader" style="margin:0; text-align: left; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Select a friend to start chatting</h2>
                </div>
                <div id="chatSettings" style="display:none; position:relative;">
                    <button onclick="toggleSettingsMenu()" class="settings-btn">&#9881;</button>
                    <div id="settingsMenu" class="settings-menu">
                        <button onclick="deleteChat('1DAY')">&#128451; Clear Last 1 Day</button>
                        <button onclick="deleteChat('7DAYS')">&#128451; Clear Last 7 Days</button>
                        <button onclick="deleteChat('ALL')" class="danger-btn">&#9888; Delete All</button>
                    </div>
                </div>
            </div>
            <div id="chatHistory"
                style="flex:1; overflow-y:auto; padding:20px; display:none; flex-direction:column; gap:10px;">
                <!-- Chat messages will go here -->
            </div>
            <div id="typingIndicator" class="typing-indicator"><span>typing</span><span>.</span><span>.</span><span>.</span></div>
            
            <!-- Reply Preview Bar -->
            <div id="replyPreviewBar" style="display:none; justify-content:space-between; align-items:center; background:var(--bg-color); padding:8px 16px; border-top:1px solid var(--border-color); border-bottom:1px solid var(--border-color); font-size:12px;">
                <div style="display:flex; flex-direction:column; min-width:0; flex:1; border-left:3px solid var(--primary); padding-left:8px;">
                    <span id="replySender" style="font-weight:600; color:var(--primary);">Replying to pankaj</span>
                    <span id="replySnippet" style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Hello there!</span>
                </div>
                <button onclick="cancelReply()" style="background:none; border:none; font-size:18px; color:var(--text-muted); cursor:pointer; width:auto; padding:0 4px; font-weight:bold; box-shadow:none;">&times;</button>
            </div>
            
            <!-- Edit Preview Bar -->
            <div id="editPreviewBar" style="display:none; justify-content:space-between; align-items:center; background:var(--bg-color); padding:8px 16px; border-top:1px solid var(--border-color); border-bottom:1px solid var(--border-color); font-size:12px;">
                <div style="display:flex; flex-direction:column; min-width:0; flex:1; border-left:3px solid var(--whatsapp-green); padding-left:8px;">
                    <span style="font-weight:600; color:var(--whatsapp-green);">Editing Message</span>
                    <span id="editSnippet" style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Wrong message</span>
                </div>
                <button onclick="cancelEdit()" style="background:none; border:none; font-size:18px; color:var(--text-muted); cursor:pointer; width:auto; padding:0 4px; font-weight:bold; box-shadow:none;">&times;</button>
            </div>

            <!-- Emoji Picker -->
            <div id="emojiPicker" class="emoji-picker" style="display:none;">
                <div class="emoji-categories">
                    <span onclick="filterEmojis('smileys')" title="Smileys & Emotion">ΏθαΑ</span>
                    <span onclick="filterEmojis('animals')" title="Animals & Nature">ΏθΡ▒</span>
                    <span onclick="filterEmojis('food')" title="Food & Drink">ΏθΞΟ</span>
                    <span onclick="filterEmojis('activities')" title="Activities">έγ╜</span>
                    <span onclick="filterEmojis('travel')" title="Travel & Places">ΏθγΩ</span>
                    <span onclick="filterEmojis('objects')" title="Objects">ΏθΤκ</span>
                    <span onclick="filterEmojis('symbols')" title="Symbols">έζνΎ╕Π</span>
                </div>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>

            <div id="chatInputArea" style="display:none; flex-direction:row; align-items:center; gap:8px; padding: 10px 14px;">
                <button onclick="toggleEmojiPicker()" class="media-btn" id="emojiBtn" title="Emojis">ΏθαΑ</button>
                <input type="file" id="mediaInput" accept="image/*,audio/*,video/*" style="display:none;"
                    onchange="handleMediaUpload(event)">
                <button onclick="document.getElementById('mediaInput').click()" class="media-btn" title="Attach file">&#128206;</button>
                
                <textarea id="chatMessage" placeholder="Type a message..."
                    onkeydown="handleKeyDown(event)" oninput="handleTypingInput()" autocomplete="off" enterkeyhint="send" rows="1" style="flex:1; width:0; min-width:0;"></textarea>

                <button onclick="startAudioRecording()" id="micBtn" class="media-btn" title="Voice message">&#127908;</button>
                <button onclick="sendMessage()" id="sendBtn" style="width:auto; padding:8px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap;">Send</button>
            </div>
        </div>
    </div>

    <script>
        let replyingToMessageId = null;
        let editingMessageId = null;

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function sendFriendRequest(receiverEmail, btnElement) {
            if (btnElement) {
                btnElement.disabled = true;
                btnElement.innerText = "Sending...";
            }
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/request.send', {}, JSON.stringify({ receiverEmail: receiverEmail }));
                if (btnElement) btnElement.innerText = "Sent";
            } else {
                alert('WebSocket not connected. Please try again.');
                if (btnElement) {
                    btnElement.disabled = false;
                    btnElement.innerText = "Add Friend";
                }
            }
        }

        function updateNotificationBadge() {
            fetch('/api/request/pending')
                .then(res => res.json())
                .then(data => {
                    let badge = document.getElementById('notifBadge');
                    if (data && data.length > 0) {
                        if (badge) { badge.innerText = data.length; badge.style.display = 'inline-block'; }
                    } else {
                        if (badge) badge.style.display = 'none';
                    }
                })
                .catch(err => console.error(err));
        }

        function toggleMobileSearch() {
            let box = document.querySelector('.search-box');
            box.classList.toggle('mobile-expanded');
            if (box.classList.contains('mobile-expanded')) {
                setTimeout(function() {
                    document.getElementById('navbarSearchInput').focus();
                }, 100);
            } else {
                document.getElementById('navbarSearchInput').value = '';
                navbarSearchUser();
            }
        }
        // Close mobile search when clicking outside
        document.addEventListener('click', function(e) {
            let box = document.querySelector('.search-box');
            if (box && box.classList.contains('mobile-expanded') && !box.contains(e.target)) {
                box.classList.remove('mobile-expanded');
                document.getElementById('navbarSearchInput').value = '';
                navbarSearchUser();
                // Also update notification badge count
                updateNotificationBadge();
            }
        });

        function searchUser() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let usersTab = document.getElementById("usersTab");
            let users = usersTab.getElementsByClassName("user");

            for (let i = 0; i < users.length; i++) {
                let email = users[i].getElementsByTagName("p")[0].innerText.toLowerCase();
                let name = users[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

                if (email.indexOf(input) > -1 || name.indexOf(input) > -1) {
                    users[i].style.display = "flex";
                } else {
                    users[i].style.display = "none";
                }
            }
        }

        let currentUserEmail = null;
        let currentUsername = null;
        let currentChatConnectionId = null;
        let currentFriendEmail = null;
        let stompClient = null;
        let currentSubscription = null;
        let pendingSentIds = [];
        let sendCounter = 0;
        let isCurrentlyTyping = false;
        let typingTimeoutId = null;

        const emojiMap = {

        function autoResizeTextarea() {
            let textarea = document.getElementById('chatMessage');
            if (!textarea) return;
            textarea.style.height = '38px';
            let newHeight = textarea.scrollHeight;
            if (newHeight > 120) {
                textarea.style.height = '120px';
                textarea.style.overflowY = 'auto';
            } else {
                textarea.style.height = newHeight + 'px';
                textarea.style.overflowY = 'hidden';
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function toggleEmojiPicker() {
            let picker = document.getElementById('emojiPicker');
            if (picker.style.display === 'none' || !picker.style.display) {
                picker.style.display = 'flex';
                let grid = document.getElementById('emojiGrid');
                if (grid.children.length === 0) {
                    filterEmojis('smileys');
                }
            } else {
                picker.style.display = 'none';
            }
        }

        function filterEmojis(category) {
            let grid = document.getElementById('emojiGrid');
            grid.innerHTML = '';
            let emojis = emojiMap[category] || [];
            emojis.forEach(emoji => {
                let span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = emoji;
                span.onclick = function(e) {
                    e.stopPropagation();
                    insertEmoji(emoji);
                };
                grid.appendChild(span);
            });
        }

        function insertEmoji(emoji) {
            let textarea = document.getElementById('chatMessage');
            let startPos = textarea.selectionStart;
            let endPos = textarea.selectionEnd;
            let text = textarea.value;
            textarea.value = text.substring(0, startPos) + emoji + text.substring(endPos);
            
            let newCursorPos = startPos + emoji.length;
            textarea.selectionStart = textarea.selectionEnd = newCursorPos;
            textarea.focus();
            
            autoResizeTextarea();
            handleTypingInput();
        }

        // Close emoji picker on click outside
        document.addEventListener('click', function(e) {
            let picker = document.getElementById('emojiPicker');
            let btn = document.getElementById('emojiBtn');
            if (picker && picker.style.display === 'flex') {
                if (!picker.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
                    picker.style.display = 'none';
                }
            }
        });

        function handleTypingInput() {
            autoResizeTextarea();
            if (!currentChatConnectionId || !stompClient || !stompClient.connected) return;

            if (!isCurrentlyTyping) {
                isCurrentlyTyping = true;
                stompClient.send('/app/chat.typing', {}, JSON.stringify({
                    connectionId: currentChatConnectionId,
                    isTyping: true
                }));
            }

            if (typingTimeoutId) {
                clearTimeout(typingTimeoutId);
            }

            typingTimeoutId = setTimeout(function() {
                isCurrentlyTyping = false;
                if (stompClient && stompClient.connected) {
                    stompClient.send('/app/chat.typing', {}, JSON.stringify({
                        connectionId: currentChatConnectionId,
                        isTyping: false
                    }));
                }
            }, 1500);
        }

        function navbarSearchUser() {
            let query = document.getElementById('navbarSearchInput').value.trim();
            backToContacts();
            showTab('users');
            
            let url = query === "" ? '/active-users' : '/api/users/search?query=' + encodeURIComponent(query);
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    let userList = document.getElementById("userList");
                    userList.innerHTML = '';
                    let addedUsers = 0;
                    let statusPromises = [];
                    data.forEach(user => {
                        let email = user.useremail || 'No email';
                        if (email !== 'No email' && email !== currentUserEmail) {
                            statusPromises.push(
                                fetch('/api/user/status/' + encodeURIComponent(email))
                                    .then(res => res.json())
                                    .then(s => ({ email, isOnline: s.isOnline }))
                                    .catch(() => ({ email, isOnline: false }))
                            );
                        }
                    });
                    Promise.all(statusPromises).then(statuses => {
                        let statusMap = {};
                        statuses.forEach(s => { statusMap[s.email] = s.isOnline; });
                        data.forEach(user => {
                            let username = user.username || 'Unknown';
                            let email = user.useremail || 'No email';
                            
                            if (email !== 'No email' && email === currentUserEmail) return;
                            if (currentUsername && username !== 'Unknown' && username === currentUsername) return;
                            if (username === currentUserEmail) return;

                            addedUsers++;
                            let profileInitial = username.charAt(0).toUpperCase();
                            let isOnline = statusMap[email] || false;
                            let statusColor = isOnline ? 'var(--whatsapp-green)' : 'var(--text-muted)';

                            let userHtml = `
                                <div class="user" data-email="${esc(email)}">
                                    <div style="display:flex; align-items:center; flex:1; min-width:0;">
                                        <div class="profile-wrapper">
                                            <div class="profile" style="background: ${isOnline ? '' : 'var(--text-muted)'}">${esc(username)}</div>
                                            <span class="online-dot" style="display: block; background: ${statusColor};"></span>
                                        </div>
                                        <div class="details">
                                            <h3>${esc(username)}</h3>
                                            <p class="status-text" style="color: ${statusColor}; font-size: 11px;">${isOnline ? 'online' : 'offline'}</p>
                                        </div>
                                    </div>
                                    <button id="addBtn-${esc(email)}" onclick="sendFriendRequest('${esc(email)}', this)" class="add-friend-btn">Add Friend</button>
                                </div>
                            `;
                            userList.innerHTML += userHtml;
                        });
                        if (addedUsers === 0) {
                            userList.innerHTML = '<p style="text-align:center; padding:20px; color: var(--text-secondary);">No users found matching your search.</p>';
                        }
                    });
                })
                .catch(err => console.error('Error in search:', err));
        }

        function updateUserStatusUI(email, isOnline, lastSeen) {
            let statusColor = isOnline ? 'var(--whatsapp-green)' : 'var(--text-muted)';
            let statusText = isOnline ? 'online' : 'offline';

            // Update All Users tab items
            document.querySelectorAll('#userList .user[data-email]').forEach(function(el) {
                if (el.getAttribute('data-email') === email) {
                    let dot = el.querySelector('.online-dot');
                    let statusP = el.querySelector('p.status-text');
                    let avatar = el.querySelector('.profile');
                    if (dot) {
                        dot.style.background = statusColor;
                        dot.style.display = 'block';
                    }
                    if (statusP) {
                        statusP.innerText = statusText;
                        statusP.style.color = statusColor;
                    }
                    if (avatar) {
                        avatar.style.background = isOnline ? '' : 'var(--text-muted)';
                    }
                }
            });

            // Update friend list items
            document.querySelectorAll('#friendList .user[data-email]').forEach(function(el) {
                if (el.getAttribute('data-email') === email) {
                    let dot = el.querySelector('.online-dot');
                    let statusP = el.querySelector('p.status-text');
                    let avatar = el.querySelector('.profile');
                    if (dot) {
                        dot.style.background = statusColor;
                        dot.style.display = 'block';
                    }
                    if (statusP) {
                        statusP.innerText = statusText;
                        statusP.style.color = statusColor;
                    }
                    if (avatar) {

        function showToast(message, type) {
            let existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            let toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--card-bg); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:14px 20px; box-shadow:0 8px 32px rgba(0,0,0,0.12); z-index:9999; font-size:14px; font-weight:500; color:var(--text-main); display:flex; align-items:center; gap:10px; animation:fadeInUp 0.3s ease; max-width:90%;';
            let icon = type === 'success' ? '&#10003;' : type === 'request' ? '&#128276;' : '&#8505;';
            toast.innerHTML = '<span style="font-size:18px;">' + icon + '</span><span>' + message + '</span>';
            document.body.appendChild(toast);
            setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(function() { toast.remove(); }, 300); }, 4000);
        }

        let audioCtx = null;

        function initAudioOnUserClick() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            console.log('AudioContext created for notifications');
        }

        function playNotificationSound() {
            try {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(function() { doPlayNotificationSound(audioCtx); });
                } else {
                    doPlayNotificationSound(audioCtx);
                }
            } catch(e) { console.warn('Sound error:', e); }
        }

        function doPlayNotificationSound(ctx) {
            try {
                let now = ctx.currentTime;
                let notes = [523.25, 659.25, 783.99];
                let duration = 0.12;
                notes.forEach(function(freq, i) {
                    let osc = ctx.createOscillator();
                    let gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.3, now + i * duration);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * duration + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * duration);
                    osc.stop(now + i * duration + 0.25);
                });
            } catch(e) { console.warn('Play sound error:', e); }
        }

        function playRequestSound() {
            try {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(function() { doPlayRequestSound(audioCtx); });
                } else {
                    doPlayRequestSound(audioCtx);
                }
            } catch(e) { console.warn('Sound error:', e); }
        }

        function doPlayRequestSound(ctx) {
            try {
                let now = ctx.currentTime;
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.setValueAtTime(660, now + 0.15);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.4);
            } catch(e) { console.warn('Play sound error:', e); }
        }

            return false;
        }

        let friendsSubscription = null;

        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;

        function connectWebSocket() {
            let backendUrl = window.location.origin;

            fetch('/config.json')
                .then(r => {
                    if (!r.ok) throw new Error('config.json not found');
                    return r.json();
                })
                .then(config => {
                    if (config && config.BACKEND_URL) {
                        backendUrl = config.BACKEND_URL;
                    }
                })
                .catch(err => {
                    console.warn('Config file not found or invalid, using default backend:', backendUrl);
                })
                .finally(() => {
                    fetch('/api/token')
                        .then(r => {
                            if (!r.ok) throw new Error('Token endpoint error');
                            return r.json();
                        })
                        .then(data => {
                            const token = data.token || '';
                            let socket = new SockJS(backendUrl + '/ws?token=' + token);
                            stompClient = Stomp.over(socket);
                            stompClient.debug = null;
                            stompClient.heartbeat.outgoing = 10000;
                            stompClient.heartbeat.incoming = 10000;

                            socket.onclose = function(event) {
                                console.warn('WebSocket socket closed:', event.code, event.reason);
                                if (event.code !== 1000) {
                                    let delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
                                    reconnectAttempts++;
                                    console.log('Reconnecting in ' + delay + 'ms (attempt ' + reconnectAttempts + ')');
                                    setTimeout(connectWebSocket, delay);
                                }
                            };

                            socket.onerror = function(error) {
                                console.error('WebSocket socket error:', error);
                            };

                            stompClient.connect({}, function (frame) {
                                console.log('Connected to WebSocket STOMP');
                                reconnectAttempts = 0;

                                stompClient.subscribe('/topic/status', function (payload) {
                                    let data = JSON.parse(payload.body);
                                    updateUserStatusUI(data.email, data.online, data.lastSeen);
                                });

                                subscribeToNotifications();
                                subscribeToFriendList();
                                subscribeToRequestConfirm();

                                if (currentChatConnectionId) {
                                    subscribeToChat(currentChatConnectionId);
                                }
                            }, function (error) {
                                console.error('WebSocket STOMP Error: ', error);
                                let delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
                                reconnectAttempts++;
                                console.log('Reconnecting in ' + delay + 'ms (attempt ' + reconnectAttempts + ')');
                                setTimeout(connectWebSocket, delay);
                            });
                        })
                        .catch(err => {
                            console.error('Failed to fetch WebSocket token:', err);
                            let delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
                            reconnectAttempts++;
                            setTimeout(connectWebSocket, delay);
                        });
                });
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                if (!stompClient || !stompClient.connected) {
                    reconnectAttempts = 0;
                    connectWebSocket();
                }
            }
        });

        function subscribeToChat(connectionId) {
            if (currentSubscription) {
                currentSubscription.unsubscribe();
            }
            if (stompClient && stompClient.connected) {
                currentSubscription = stompClient.subscribe('/topic/chat/' + connectionId, function (payload) {
                    let data = JSON.parse(payload.body);
                    if (data.type === 'TYPING_STATUS') {
                        if (data.user !== currentUserEmail) {
                            let indicator = document.getElementById('typingIndicator');
                            if (indicator) {
                                indicator.style.display = data.isTyping ? 'block' : 'none';
                                if (data.isTyping) {
                                    let history = document.getElementById('chatHistory');
                                    if (history) {
                                        history.scrollTop = history.scrollHeight;
                                    }
                                }
                            }
                        }
                    } else if (data.type === 'DELIVERY_RECEIPT') {
                        handleDeliveryReceipt(data);
                    } else if (data.type === 'READ_RECEIPT') {
                        handleReadReceipt(data);
                    } else if (data.type === 'MESSAGE_SAVED') {
                        let msgEl = document.querySelector('[data-message-id="-1"]');
                        if (msgEl && msgEl.closest('#chatHistory')) {
                            msgEl.setAttribute('data-message-id', data.realId);
                            let tick = msgEl.querySelector('.tick');
                            if (tick && data.isDelivered) {
                                tick.className = 'tick delivered';
                                tick.innerHTML = '&#10003;&#10003;';
                            }
                        }
                    } else if (data.type === 'MESSAGE_DELETED') {
                        let msgEl = document.querySelector('[data-message-id="' + data.messageId + '"]');
                        if (msgEl) {
                            msgEl.remove();
                        }
                    } else if (data.type === 'MESSAGE_EDITED') {
                        let msgEl = document.querySelector('[data-message-id="' + data.messageId + '"]');
                        if (msgEl) {
                            let textEl = msgEl.querySelector('.msg-text');
                            if (textEl) {
                                textEl.innerText = data.newMessage;
                            }
                            let editedTag = msgEl.querySelector('.edited-tag');
                            if (!editedTag) {
                                let contentBlock = textEl.parentElement;
                                let tag = document.createElement('small');
                                tag.className = 'edited-tag';
                                tag.style.cssText = 'font-size:10px; opacity:0.6; font-style:italic; margin-left:4px;';
                                tag.innerText = '(edited)';
                                contentBlock.insertBefore(tag, contentBlock.querySelector('.tick') || null);
                            }
                        }
                    } else if (data.sender === currentUserEmail && pendingSentIds.length > 0) {
                        let localId = pendingSentIds.shift();
                        let msgEl = document.querySelector('[data-message-id="' + localId + '"]');
                        if (msgEl) {
                            msgEl.setAttribute('data-message-id', data.id && data.id !== -1 ? data.id : localId);
                            let tick = msgEl.querySelector('.tick');
                            if (tick && data.isDelivered) {
                                tick.className = 'tick delivered';
                                tick.innerHTML = '&#10003;&#10003;';
                            }
                        }
                    } else if (data.sender !== currentUserEmail) {
                        appendMessageToChat(data);
                        if (stompClient && stompClient.connected) {
                            stompClient.send('/app/chat.read', {}, JSON.stringify({ connectionId: connectionId }));
                        }
                        if (shouldPlaySound()) playNotificationSound();
                    }
                });
            }
        }

        function handleDeliveryReceipt(data) {
            if (data.messageId) {
                let msgEl = document.querySelector('[data-message-id="' + data.messageId + '"]');
                if (msgEl) {
                    let tick = msgEl.querySelector('.tick');
                    if (tick) {
                        tick.className = 'tick delivered';
                        tick.innerHTML = '&#10003;&#10003;';
                    }
                }
            } else {
                loadChatHistory();
            }
        }

        function handleReadReceipt(data) {
            if (data.connectionId) {
                let ticks = document.querySelectorAll('.chat-msg.me .tick');
                ticks.forEach(function(t) {
                    t.className = 'tick read';
                    t.innerHTML = '&#10003;&#10003;';
                });
            }
        }

        function showTab(tab) {
            let btnUsers = document.getElementById('btnTabUsers');
            let btnFriends = document.getElementById('btnTabFriends');

            if (tab === 'users') {
                document.getElementById('usersTab').style.display = 'block';
                document.getElementById('friendsTab').style.display = 'none';
                btnUsers.classList.add('active');
                btnFriends.classList.remove('active');
            } else {
                document.getElementById('usersTab').style.display = 'none';
                document.getElementById('friendsTab').style.display = 'block';

        function loadFriends() {
            fetch('/api/friends')
                .then(res => res.json())
                .then(data => {
                    let friendList = document.getElementById("friendList");
                    friendList.innerHTML = '';
                    if (data.length === 0) {
                        friendList.innerHTML = '<p style="text-align:center; padding:20px; color: var(--text-secondary);">No friends yet. Add friends to start chatting.</p>';
                        return;
                    }
                    let statusPromises = [];
                    data.forEach(conn => {
                        let friendEmail = conn.user1Email === currentUserEmail ? conn.user2Email : conn.user1Email;
                        statusPromises.push(
                            fetch('/api/user/status/' + encodeURIComponent(friendEmail))
                                .then(res => res.json())
                                .then(status => ({ email: friendEmail, isOnline: status.isOnline }))
                                .catch(() => ({ email: friendEmail, isOnline: false }))
                        );
                    });
                    Promise.all(statusPromises).then(statuses => {
                        let statusMap = {};
                        statuses.forEach(s => { statusMap[s.email] = s.isOnline; });
                        data.forEach(conn => {
                            let friendEmail = conn.user1Email === currentUserEmail ? conn.user2Email : conn.user1Email;
                            let isOnline = statusMap[friendEmail] || false;
                            let profileInitial = friendEmail.charAt(0).toUpperCase();
                            let statusColor = isOnline ? 'var(--whatsapp-green)' : 'var(--text-muted)';
                            let statusText = isOnline ? 'online' : 'offline';

                            let friendHtml = `
                                <div class="user" onclick="openChat(${conn.id}, '${esc(friendEmail)}')" data-email="${esc(friendEmail)}">
                                    <div class="profile-wrapper">
                                        <div class="profile" style="background: ${isOnline ? '' : 'var(--text-muted)'}">${esc(profileInitial)}</div>
                                        <span class="online-dot" style="display: block; background: ${statusColor};"></span>
                                    </div>
                                    <div class="details">
                                        <h3>${esc(friendEmail.split('@')[0])}</h3>
                                        <p class="status-text" style="color: ${statusColor}; font-size: 11px;">${statusText}</p>
                                    </div>
                                </div>
                            `;
                            friendList.innerHTML += friendHtml;
                        });
                    });
                });
        }

        function isMobile() {

        }

        function backToContacts() {
            // Unsubscribe from active chat connections to prevent hidden reading & notification bugs
            if (currentSubscription) {
                currentSubscription.unsubscribe();
                currentSubscription = null;
            }
            currentChatConnectionId = null;
            currentFriendEmail = null;

            // Reset chat panel back to default state
            let chatHeader = document.getElementById('chatHeader');
            if (chatHeader) {
                chatHeader.innerText = "Select a friend to start chatting";
            }
            let chatHistory = document.getElementById('chatHistory');
            if (chatHistory) {
                chatHistory.style.display = 'none';
                chatHistory.innerHTML = '';

            let chatInputArea = document.getElementById('chatInputArea');
            if (chatInputArea) {
                chatInputArea.style.display = 'none';
            }
            let chatSettings = document.getElementById('chatSettings');
            if (chatSettings) {
                chatSettings.style.display = 'none';
            }

            if (isMobile()) {
                document.querySelector('.left-panel').classList.remove('hidden-mobile');
                document.querySelector('.right-panel').classList.remove('visible-mobile');
                
                // Force scroll reset to ensure the top navbar is visible and not shifted by keyboard focus scroll
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                document.documentElement.scrollTop = 0;

        function openChat(connectionId, friendEmail) {
            currentChatConnectionId = connectionId;
            currentFriendEmail = friendEmail;
            
            // Hide typing indicator for new chat and reset local typing state
            let indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.style.display = 'none';
            isCurrentlyTyping = false;
            if (typingTimeoutId) clearTimeout(typingTimeoutId);

            document.getElementById('chatHeader').innerHTML = friendEmail.split('@')[0] + ' <span id="friendStatus" style="font-size:13px; font-weight:normal; color: var(--text-secondary);"></span>';
            document.getElementById('chatHistory').style.display = 'flex';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('chatSettings').style.display = 'block';

            if (isMobile()) {
                document.querySelector('.left-panel').classList.add('hidden-mobile');
                document.querySelector('.right-panel').classList.add('visible-mobile');
            }

            // Auto-focus input to open keyboard on mobile
            setTimeout(function() {
                document.getElementById('chatMessage').focus();
            }, 300);

            fetch('/api/user/status/' + encodeURIComponent(friendEmail))
                .then(res => res.json())
                .then(status => {
                    let el = document.getElementById('friendStatus');
                    if (status.isOnline) {
                        el.innerHTML = '<span style="color: var(--whatsapp-green);">Online</span>';
                    } else if (status.lastSeen) {
                        let d = new Date(status.lastSeen);
                        let timeStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        el.innerHTML = '<span style="color: var(--text-muted);">Last seen ' + timeStr + '</span>';
                    } else {
                        el.innerHTML = '';
                    }
                })
                .catch(function() { document.getElementById('friendStatus').innerHTML = ''; });

            loadChatHistory();
            subscribeToChat(connectionId);

            if (confirm(label + ' έΑΦ are you sure?')) {

                    .then(res => {

        function appendMessageToChat(msg) {
            let historyDiv = document.getElementById('chatHistory');

            let isMe = msg.sender === currentUserEmail;
            let msgClass = isMe ? 'me' : 'them';
            let align = isMe ? 'flex-end' : 'flex-start';

            let mediaContent = '';
            if (msg.messageType === 'IMAGE' && msg.mediaData) {
                mediaContent = `<img src="${msg.mediaData}" onerror="this.onerror=null; this.src=''; this.alt='[Image missing]';" ondblclick="openFullScreenImage(this.src)" style="max-width:280px; max-height:300px; object-fit:contain; border-radius:8px; margin-top:6px;"/>`;
            } else if (msg.messageType === 'AUDIO' && msg.mediaData) {
                mediaContent = `<audio controls src="${msg.mediaData}" onerror="this.onerror=null; this.parentElement.innerHTML += '<br><small style=\\'color:var(--danger)\\'>[Audio missing]</small>';" style="max-width:250px; margin-top:6px;"></audio>`;
            } else if (msg.messageType === 'VIDEO' && msg.mediaData) {
                mediaContent = `<video controls src="${msg.mediaData}" style="max-width:280px; border-radius:8px; margin-top:6px;"></video>`;
            }

            let timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            let tickHtml = '';
            if (isMe) {
                if (msg.isDelivered) {
                    tickHtml = '<span class="tick delivered">&#10003;&#10003;</span>';
                } else {
                    tickHtml = '<span class="tick sent">&#10003;</span>';
                }
            }

            let quoteHtml = '';
            if (msg.parentMessageId) {
                let pText = msg.parentMessageText || '[Encrypted message]';
                let pSender = msg.parentMessageSender || 'Unknown';
                quoteHtml = `
                    <div class="quoted-msg" onclick="scrollToMessage(${msg.parentMessageId})" style="background:rgba(0,0,0,0.06); border-left:3px solid var(--primary); padding:6px; border-radius:4px; margin-bottom:6px; font-size:12px; cursor:pointer; width:100%; text-align:left;">
                        <strong style="color:var(--primary); font-size:11px;">${esc(pSender)}</strong>
                        <div style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px;">${esc(pText)}</div>
                    </div>
                `;
            }

            let editedHtml = msg.isEdited ? ' <small class="edited-tag" style="font-size:10px; opacity:0.6; font-style:italic; margin-left:4px;">(edited)</small>' : '';

            let msgIdAttr = msg.id ? 'data-message-id="' + msg.id + '"' : '';
            let senderNameEscaped = esc(msg.senderName || msg.sender);
            let messageTextEscaped = esc(msg.message || '');

            historyDiv.innerHTML += `
                <div class="chat-msg ${msgClass}" style="align-self: ${align};" ${msgIdAttr}
                     data-sender-name="${senderNameEscaped}"
                     data-message-text="${messageTextEscaped}">
                    <div class="chat-time">${senderNameEscaped} - ${esc(timestamp)}</div>
                    ${quoteHtml}
                    <div style="display:flex; flex-wrap:wrap; align-items:baseline; gap:4px; text-align:left; width:100%;">
                        <span class="msg-text">${esc(msg.message)}</span>
                        ${editedHtml}
                        ${tickHtml}
                    </div>
                    ${mediaContent}
                    <span class="msg-menu-trigger" onclick="openMsgMenu(event, '${msg.id}', ${isMe}, this.closest('.chat-msg'))">&#8942;</span>
                </div>
            `;

            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        let chatPage = 0;
        let hasMoreMessages = true;

        function loadChatHistory() {
            chatPage = 0;
            hasMoreMessages = true;
            fetchChatPage(0, true);
        }

        function loadOlderMessages() {
            if (!hasMoreMessages || !currentChatConnectionId) return;
            chatPage++;
            fetchChatPage(chatPage, false);
        }

        function fetchChatPage(page, replace) {
            if (!currentChatConnectionId) return;
            fetch('/api/chat/history?connectionId=' + currentChatConnectionId + '&page=' + page)
                .then(res => res.json())
                .then(data => {
                    let historyDiv = document.getElementById('chatHistory');

                    if (data.length < 50) {
                        hasMoreMessages = false;
                    }

                    let loadMoreBtn = document.getElementById('loadMoreBtn');
                    if (loadMoreBtn) loadMoreBtn.remove();

                    if (replace) {
                        historyDiv.innerHTML = '';
                        data.forEach(function(msg) {
                            appendMessageToChat(msg);
                        });
                        if (hasMoreMessages) {
                            let btn = document.createElement('div');
                            btn.id = 'loadMoreBtn';
                            btn.style.cssText = 'text-align:center; padding:8px;';
                            btn.innerHTML = '<button onclick="loadOlderMessages()" style="width:auto; padding:8px 20px; background:var(--primary-light); color:var(--primary); border:none; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer;">Load older messages</button>';
                            historyDiv.prepend(btn);
                        }
                    } else if (data.length > 0) {
                        let firstChild = historyDiv.firstChild;
                        data.forEach(function(msg) {
                            let wrapper = document.createElement('div');
                            wrapper.innerHTML = createMessageHtml(msg);
                            historyDiv.insertBefore(wrapper.firstElementChild, firstChild);
                        });
                    }

                    historyDiv.scrollTop = historyDiv.scrollHeight;
                });
        }

        function createMessageHtml(msg) {
            let isMe = msg.sender === currentUserEmail;
            let msgClass = isMe ? 'me' : 'them';
            let align = isMe ? 'flex-end' : 'flex-start';

            let mediaContent = '';
            if (msg.messageType === 'IMAGE' && msg.mediaData) {
                mediaContent = '<img src="' + msg.mediaData + '" onerror="this.onerror=null; this.src=\'\'; this.alt=\'[Image missing]\';" ondblclick="openFullScreenImage(this.src)" style="max-width:280px; max-height:300px; object-fit:contain; border-radius:8px; margin-top:6px;"/>';
            } else if (msg.messageType === 'AUDIO' && msg.mediaData) {
                mediaContent = '<audio controls src="' + msg.mediaData + '" style="max-width:250px; margin-top:6px;"></audio>';
            } else if (msg.messageType === 'VIDEO' && msg.mediaData) {
                mediaContent = '<video controls src="' + msg.mediaData + '" style="max-width:280px; border-radius:8px; margin-top:6px;"></video>';
            }

            let timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            let tickHtml = '';
            if (isMe) {
                tickHtml = msg.isDelivered ? '<span class="tick delivered">&#10003;&#10003;</span>' : '<span class="tick sent">&#10003;</span>';
            }

            let quoteHtml = '';
            if (msg.parentMessageId) {
                let pText = msg.parentMessageText || '[Encrypted message]';
                let pSender = msg.parentMessageSender || 'Unknown';
                quoteHtml = '<div class="quoted-msg" onclick="scrollToMessage(' + msg.parentMessageId + ')" style="background:rgba(0,0,0,0.06); border-left:3px solid var(--primary); padding:6px; border-radius:4px; margin-bottom:6px; font-size:12px; cursor:pointer; width:100%; text-align:left;">' +
                    '<strong style="color:var(--primary); font-size:11px;">' + esc(pSender) + '</strong>' +
                    '<div style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px;">' + esc(pText) + '</div>' +
                    '</div>';
            }

            let editedHtml = msg.isEdited ? ' <small class="edited-tag" style="font-size:10px; opacity:0.6; font-style:italic; margin-left:4px;">(edited)</small>' : '';

            let msgIdAttr = msg.id ? 'data-message-id="' + msg.id + '"' : '';

            return '<div class="chat-msg ' + msgClass + '" style="align-self: ' + align + ';" ' + msgIdAttr + '>' +
                '<div class="chat-time">' + esc(msg.senderName || msg.sender) + ' - ' + esc(timestamp) + '</div>' +
                quoteHtml +
                '<div style="display:flex; flex-wrap:wrap; align-items:baseline; gap:4px; text-align:left; width:100%;"><span class="msg-text">' + esc(msg.message || '') + '</span>' + editedHtml + tickHtml + '</div>' +
                mediaContent +
                '<span class="msg-menu-trigger" onclick="openMsgMenu(event, \'' + msg.id + '\', ' + isMe + ', this.closest(\'.chat-msg\'))">&#8942;</span>' +
                '</div>';
        }

        let isSending = false;

        function sendMessage() {
            if (isSending) return;
            let input = document.getElementById('chatMessage');
            let msg = input.value.trim();
            if (!msg || !currentChatConnectionId) return;

            // If in editing mode, call the REST API instead
            if (editingMessageId) {
                updateMessageContent(editingMessageId, msg);
                return;
            }

            if (stompClient && stompClient.connected) {
                isSending = true;
                let sendBtn = document.getElementById('sendBtn');
                sendBtn.disabled = true;

                let localId = 'send_' + (++sendCounter);
                pendingSentIds.push(localId);

                // Construct message payload
                let payload = {
                    connectionId: currentChatConnectionId,
                    message: msg,
                    messageType: 'TEXT',
                    parentMessageId: replyingToMessageId // Pass parent message ID if replying
                };

                // Append local message placeholder
                appendMessageToChat({
                    id: localId,
                    sender: currentUserEmail,
                    senderName: currentUsername || currentUserEmail,
                    message: msg,
                    messageType: 'TEXT',
                    timestamp: new Date().toISOString(),
                    isDelivered: false,
                    parentMessageId: replyingToMessageId,
                    parentMessageText: replyingToMessageId ? document.getElementById('replySnippet').innerText : null,
                    parentMessageSender: replyingToMessageId ? document.getElementById('replySender').innerText.replace('Replying to ', '') : null,
                    isEdited: false
                });

                stompClient.send('/app/chat.send', {}, JSON.stringify(payload));
                input.value = '';
                autoResizeTextarea();

                // Reset typing state immediately
                if (isCurrentlyTyping) {
                    isCurrentlyTyping = false;
                    if (typingTimeoutId) clearTimeout(typingTimeoutId);
                    stompClient.send('/app/chat.typing', {}, JSON.stringify({
                        connectionId: currentChatConnectionId,
                        isTyping: false
                    }));
                }

                // Clear reply preview
                cancelReply();

                setTimeout(function() {
                    isSending = false;
                    sendBtn.disabled = false;
                }, 200);
            } else {
                alert('WebSocket is not connected. Please try again later.');
            }
        }

        function updateMessageContent(messageId, newContent) {
            let formData = new FormData();
            formData.append('messageId', messageId);
            formData.append('newContent', newContent);

            fetch('/api/chat/message/edit', {
                method: 'POST',
                body: formData
            }).then(res => {
                if (res.ok) {
                    cancelEdit();
                } else {
                    alert('Failed to edit message');
                }
            }).catch(err => {
                console.error(err);
                alert('Failed to edit message');
            });
        }

        function scrollToMessage(messageId) {
            let msgEl = document.querySelector('[data-message-id="' + messageId + '"]');
            if (msgEl) {
                msgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // Briefly flash/highlight the message

                msgEl.style.background = 'rgba(253, 203, 110, 0.4)'; // soft highlight yellow

        // Context Menu Builders
        let clickStartTime = 0;
        let clickStartTarget = null;
        let lastMenuOpenTime = 0;

        document.getElementById('chatHistory').addEventListener('click', function(e) {
            let msgEl = e.target.closest('.chat-msg');
            if (!msgEl) return;

            let ignoreTags = ['IMG', 'AUDIO', 'VIDEO', 'A', 'BUTTON'];
            let isMediaOrLink = ignoreTags.includes(e.target.tagName) || e.target.closest('.quoted-msg') || e.target.closest('button') || e.target.closest('.msg-menu-trigger');
            if (isMediaOrLink) return;

            let msgId = msgEl.getAttribute('data-message-id');
            // Ignore temporary sent message placeholders
            if (!msgId || msgId === '-1' || msgId.startsWith('send_')) return;

            let isMe = msgEl.classList.contains('me');
            let msgTextEl = msgEl.querySelector('.msg-text');
            let msgText = msgTextEl ? msgTextEl.innerText : '';
            let senderNameEl = msgEl.querySelector('.chat-time');
            let senderName = senderNameEl ? senderNameEl.innerText.split(' - ')[0] : 'Unknown';

            e.stopPropagation(); // Stop propagation immediately so the document click listener doesn't dismiss the menu
            showContextMenu(msgId, isMe, msgText, senderName, e);
        });

        function showContextMenu(msgId, isMe, msgText, senderName, event) {
            let now = Date.now();
            if (now - lastMenuOpenTime < 100) return; // Prevent double-trigger
            lastMenuOpenTime = now;
            menuOpenTimestamp = now;

            let existing = document.getElementById('msgContextMenu');
            if (existing) existing.remove();

            let menu = document.createElement('div');
            menu.id = 'msgContextMenu';
            menu.style.cssText = `
                position: fixed;
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                padding: 6px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.15);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                gap: 4px;
                min-width: 150px;
                animation: menuPopIn 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
                transform-origin: top left;
            `;

            let x = event.clientX;
            let y = event.clientY;
            
            // Resolve touch coordinates
            if (event.changedTouches && event.changedTouches.length > 0) {
                x = event.changedTouches[0].clientX;
                y = event.changedTouches[0].clientY;
            } else if (event.touches && event.touches.length > 0) {
                x = event.touches[0].clientX;
                y = event.touches[0].clientY;
            }

            // Fallback if clientX/Y are undefined
            if (x === undefined || y === undefined) {
                x = window.innerWidth / 2 - 75;
                y = window.innerHeight / 2 - 50;
            }

            // Append to body first so we can measure the menu dimensions
            document.body.appendChild(menu);

            // 1. Reply
            let btnReply = createMenuButton('Reply', function() {
                startReply(msgId, senderName, msgText);
            });
            menu.appendChild(btnReply);

            // 2. Edit (Only for own messages)
            if (isMe) {
                let btnEdit = createMenuButton('Edit', function() {
                    startEdit(msgId, msgText);
                });
                menu.appendChild(btnEdit);
            }

            // 3. Delete for me
            let btnDeleteMe = createMenuButton('Delete for me', function() {
                deleteSingleMessage(msgId, 'ME');
            });
            menu.appendChild(btnDeleteMe);

            // 4. Delete for everyone (Only for own messages)
            if (isMe) {
                let btnDeleteEveryone = createMenuButton('Delete for everyone', function() {
                    deleteSingleMessage(msgId, 'EVERYONE');
                });
                btnDeleteEveryone.style.color = 'var(--danger)';
                menu.appendChild(btnDeleteEveryone);
            }

            // Adjust position so it doesn't overflow the viewport
            let menuRect = menu.getBoundingClientRect();
            let viewportWidth = window.innerWidth;
            let viewportHeight = window.innerHeight;

            let posX = x;
            let posY = y;

            if (posX + menuRect.width > viewportWidth) {
                posX = viewportWidth - menuRect.width - 12;
            }
            if (posY + menuRect.height > viewportHeight) {
                posY = viewportHeight - menuRect.height - 12;
            }

            if (posX < 12) posX = 12;
            if (posY < 12) posY = 12;

            menu.style.left = posX + 'px';
            menu.style.top = posY + 'px';

            if (event.stopPropagation) event.stopPropagation();
        }

        function createMenuButton(text, onClick) {
            let btn = document.createElement('button');
            btn.style.cssText = 'background:none; border:none; padding:8px 12px; color:var(--text-main); font-size:13px; font-weight:500; text-align:left; cursor:pointer; width:100%; border-radius:6px; box-shadow:none; transition: background 0.15s ease, color 0.15s ease;';
            btn.innerText = text;
            btn.onclick = function(e) {
                e.stopPropagation();
                onClick();
                let m = document.getElementById('msgContextMenu');
                if (m) m.remove();
            };
            btn.onmouseover = function() { this.style.background = 'var(--bg-color)'; };
            btn.onmouseout = function() { this.style.background = 'none'; };
            return btn;
        }

        // Track when menu was last opened to prevent immediate dismiss
        let menuOpenTimestamp = 0;

        function openMsgMenu(event, msgId, isMe, msgEl) {
            event.stopPropagation();
            if (!msgId || msgId === '-1' || msgId.startsWith('send_')) return;
            let msgTextEl = msgEl.querySelector('.msg-text');
            let msgText = msgTextEl ? msgEl.querySelector('.msg-text').innerText : '';
            let senderNameEl = msgEl.querySelector('.chat-time');
            let senderName = senderNameEl ? senderNameEl.innerText.split(' - ')[0] : 'Unknown';
            showContextMenu(msgId, isMe, msgText, senderName, event);
        }

        // Close context menu on clicking elsewhere
        document.addEventListener('click', function(e) {
            if (Date.now() - menuOpenTimestamp < 300) return; // Prevent immediate dismiss
            let menu = document.getElementById('msgContextMenu');
            if (menu && !menu.contains(e.target)) {
                menu.remove();
            }
        });

        // Swipe to reply logic
        let swipeTarget = null;
        let startX = 0;
        let startY = 0;
        let diffX = 0;
        let diffY = 0;
        let isSwiping = false;

        document.getElementById('chatHistory').addEventListener('touchstart', handleSwipeStart, { passive: true });
        document.getElementById('chatHistory').addEventListener('touchmove', handleSwipeMove, { passive: false });
        document.getElementById('chatHistory').addEventListener('touchend', handleSwipeEnd);

        document.getElementById('chatHistory').addEventListener('mousedown', handleSwipeStart);
        document.addEventListener('mousemove', handleSwipeMove, { passive: false });
        document.addEventListener('mouseup', handleSwipeEnd);

        function handleSwipeStart(e) {
            let msgEl = e.target.closest('.chat-msg');
            if (!msgEl) return;
            
            let msgId = msgEl.getAttribute('data-message-id');
            if (!msgId || msgId === '-1' || msgId.startsWith('send_')) return;

            swipeTarget = msgEl;
            let touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            clickStartTime = Date.now();
            clickStartTarget = e.target;
            diffX = 0;
            diffY = 0;
            isSwiping = false;
            
            swipeTarget.style.transition = 'none';
        }

        function handleSwipeMove(e) {
            if (!swipeTarget) return;

            let touch = e.touches ? e.touches[0] : e;
            diffX = touch.clientX - startX;
            diffY = touch.clientY - startY;

            if (!isSwiping) {
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 10) {
                    isSwiping = true;
                }
            }

            if (isSwiping) {
                if (e.cancelable) e.preventDefault();

                if (diffX > 0) {
                    let translateX = Math.min(diffX, 70);
                    swipeTarget.style.transform = `translateX(${translateX}px)`;
                } else {
                    swipeTarget.style.transform = 'translateX(0px)';
                }
            }
        }

        function handleSwipeEnd(e) {
            if (!swipeTarget) return;

            swipeTarget.style.transition = 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            swipeTarget.style.transform = 'translateX(0px)';

            let touch = e.changedTouches ? e.changedTouches[0] : e;
            let currentX = touch.clientX || (e.clientX !== undefined ? e.clientX : startX);
            let currentY = touch.clientY || (e.clientY !== undefined ? e.clientY : startY);

            let distanceX = Math.abs(currentX - startX);
            let distanceY = Math.abs(currentY - startY);
            let distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
            let timeElapsed = Date.now() - clickStartTime;

            let isTouch = e.type === 'touchend';

            if (isSwiping && diffX > 60) {
                let msgId = swipeTarget.getAttribute('data-message-id');
                let msgText = swipeTarget.getAttribute('data-message-text') || '';
                let senderName = swipeTarget.getAttribute('data-sender-name') || 'Unknown';
                
                if (!msgText) {
                    let msgTextEl = swipeTarget.querySelector('.msg-text');
                    msgText = msgTextEl ? msgTextEl.innerText : '';
                }
                if (!senderName || senderName === 'Unknown') {
                    let senderNameEl = swipeTarget.querySelector('.chat-time');
                    senderName = senderNameEl ? senderNameEl.innerText.split(' - ')[0] : 'Unknown';
                }

                startReply(msgId, senderName, msgText);
            } else if (isTouch && !isSwiping && distance < 12 && timeElapsed < 500) {
                // This is a direct touch tap on mobile
                let target = clickStartTarget || e.target;
                let ignoreTags = ['IMG', 'AUDIO', 'VIDEO', 'A', 'BUTTON'];
                let isMediaOrLink = ignoreTags.includes(target.tagName) || target.closest('.quoted-msg') || target.closest('button') || target.closest('.msg-menu-trigger');
                
                if (!isMediaOrLink) {
                    let msgId = swipeTarget.getAttribute('data-message-id');
                    let isMe = swipeTarget.classList.contains('me');
                    let msgTextEl = swipeTarget.querySelector('.msg-text');
                    let msgText = msgTextEl ? msgTextEl.innerText : '';
                    let senderNameEl = swipeTarget.querySelector('.chat-time');
                    let senderName = senderNameEl ? senderNameEl.innerText.split(' - ')[0] : 'Unknown';

                    let fakeEvent = {
                        clientX: currentX,
                        clientY: currentY,
                        stopPropagation: function() {},
                        preventDefault: function() {}
                    };
                    showContextMenu(msgId, isMe, msgText, senderName, fakeEvent);
                    if (e.cancelable) e.preventDefault(); // Prevents synthetic click on mobile!
                }
            }

            swipeTarget = null;
            isSwiping = false;
            clickStartTarget = null;
        }

        // Reply and Edit UI handlers
        function startReply(msgId, sender, text) {

        function deleteSingleMessage(msgId, deleteType) {
