<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>

    <link rel="stylesheet" href="theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .tick { font-size: 13px; margin-left: 4px; vertical-align: middle; }
        .tick.sent { color: var(--text-muted); }
        .tick.delivered { color: var(--text-muted); }
        .tick.read { color: #3ecf8e; }
        .settings-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            width: auto;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .settings-btn:hover {
            background: var(--bg-color);
            transform: none;
        }
        .settings-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px;
            width: 180px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .settings-menu button {
            width: 100%;
            margin-bottom: 2px;
            padding: 10px 12px;
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            text-align: left;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .settings-menu button:hover {
            background: var(--bg-color);
            transform: none;
        }
        .settings-menu .danger-btn {
            color: var(--danger);
        }
        .settings-menu .danger-btn:hover {
            background: var(--danger-light);
        }
        .media-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            padding: 0;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .media-btn:hover {
            background: var(--bg-color);
            border-color: var(--text-muted);
            transform: none;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            animation: fadeInUp 0.5s ease;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        .empty-state p {
            font-size: 15px;
        }
        .typing-indicator {
            display: none;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            animation: fadeInUp 0.3s ease;
        }
        .typing-indicator span {
            display: inline-block;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        .chat-msg {
            animation: fadeInUp 0.3s ease;
        }
        .user {
            transition: all 0.2s ease;
        }
        .user:active {
            transform: scale(0.97);
        }
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--whatsapp-green);
            border: 2px solid var(--card-bg);
            position: absolute;
            bottom: 0;
            right: 0;
            display: none;
        }
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-right: 12px;
            flex-shrink: 0;
        }
        #chatMessage:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(91, 106, 191, 0.15);
        }
        .nav-greeting {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--danger-light);
            color: var(--danger);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            width: auto;
            align-self: center;
        }
        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 118, 117, 0.25);
        }
        .logout-btn:active {
            transform: translateY(0);
        }
        .logout-btn svg {
            flex-shrink: 0;
        }
        @media (max-width: 768px) {
            .empty-state .icon { font-size: 48px; }
            .search-toggle-btn { display: flex !important; }
            .search-box .search-toggle-btn {
                background: none; border: none; font-size: 18px; cursor: pointer;
                color: var(--text-secondary); padding: 6px; border-radius: 50%; width: 36px; height: 36px;
                align-items: center; justify-content: center; transition: all 0.2s;
            }
            .search-box .search-toggle-btn:hover {
                background: var(--bg-color); transform: none;
            }
            .search-box.mobile-expanded input { display: block !important; }
            .search-box.mobile-expanded .search-toggle-btn { display: none !important; }
            .search-box input { display: none; }
            .search-box.mobile-expanded {
                position: fixed; top: 8px; left: 8px; right: 8px; z-index: 1000;
                background: var(--card-bg); padding: 8px; border-radius: var(--radius-md);
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            }
            .search-box.mobile-expanded input {
                width: 100%; margin: 0; font-size: 16px;
            }
            .notifications a svg { width: 26px; height: 26px; }
            .logout-btn {
                padding: 8px;
                border-radius: 50%;
            }
            .logout-btn span {
                display: none;
            }
        }
    </style>

</head>

<body class="homepage-layout">

    <!-- Navbar -->
    <div class="navbar">
        <div class="user-name" id="currentUserName">
            Loading...
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="notifications" style="position: relative;">
                <a href="notifications.html" style="text-decoration: none; color: inherit; position: relative; display: flex;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-secondary);">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="notifBadge"
                        style="background:var(--primary-gradient); color:white; border-radius:50%; padding:0; width:20px; height:20px; font-size:10px; display:none; position:absolute; top:-8px; right:-10px; line-height:20px; text-align:center; font-weight:700; border:2px solid var(--navbar-bg);">0</span>
                </a>
            </div>

            <div class="search-box">
                <button id="mobileSearchToggle" class="search-toggle-btn" onclick="toggleMobileSearch()" style="display:none;">&#128269;</button>
                <input type="text" id="navbarSearchInput" placeholder="Search users..." onkeyup="navbarSearchUser()">
            </div>

            <div id="profileBtn" onclick="openProfileModal()" style="width: 38px; height: 38px; border-radius: 50%; background: var(--primary-gradient); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(108, 92, 231, 0.2); transition: transform 0.2s;" title="My Profile">
                U
            </div>
        </div>
    </div>

    <div class="main">

        <!-- Left Panel -->
        <div class="left-panel">
            <div class="tabs-container">
                <button onclick="showTab('users')" id="btnTabUsers" class="tab-btn active">All Users</button>
                <button onclick="showTab('friends')" id="btnTabFriends" class="tab-btn">Friends</button>
            </div>

            <div id="usersTab">
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search by name or email..." onkeyup="searchUser()">
                </div>
                <div class="user-list" id="userList">
                    <!-- Users will be populated dynamically from server -->
                </div>
            </div>

            <div id="friendsTab" style="display:none;">
                <div class="user-list" id="friendList">
                    <!-- Friends will be populated dynamically from server -->
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel" id="chatPanel">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding:16px 20px; background: var(--card-bg); border-radius: var(--radius-lg) var(--radius-lg) 0 0;">
                <div style="display:flex; align-items:center; gap:8px; flex:1; min-width:0;">
                    <button onclick="backToContacts()" class="back-to-contacts">&#8592;</button>
                    <h2 id="chatHeader" style="margin:0; text-align: left; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Select a friend to start chatting</h2>
                </div>
                <div id="chatSettings" style="display:none; position:relative;">
                    <button onclick="toggleSettingsMenu()" class="settings-btn">&#9881;</button>
                    <div id="settingsMenu" class="settings-menu">
                        <button onclick="deleteChat('1DAY')">&#128451; Clear Last 1 Day</button>
                        <button onclick="deleteChat('7DAYS')">&#128451; Clear Last 7 Days</button>
                        <button onclick="deleteChat('ALL')" class="danger-btn">&#9888; Delete All</button>
                    </div>
                </div>
            </div>
            <div id="chatHistory"
                style="flex:1; overflow-y:auto; padding:20px; display:none; flex-direction:column; gap:10px;">
                <!-- Chat messages will go here -->
            </div>
            <div id="typingIndicator" class="typing-indicator"><span>typing</span><span>.</span><span>.</span><span>.</span></div>
            
            <!-- Reply Preview Bar -->
            <div id="replyPreviewBar" style="display:none; justify-content:space-between; align-items:center; background:var(--bg-color); padding:8px 16px; border-top:1px solid var(--border-color); border-bottom:1px solid var(--border-color); font-size:12px;">
                <div style="display:flex; flex-direction:column; min-width:0; flex:1; border-left:3px solid var(--primary); padding-left:8px;">
                    <span id="replySender" style="font-weight:600; color:var(--primary);">Replying to pankaj</span>
                    <span id="replySnippet" style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Hello there!</span>
                </div>
                <button onclick="cancelReply()" style="background:none; border:none; font-size:18px; color:var(--text-muted); cursor:pointer; width:auto; padding:0 4px; font-weight:bold; box-shadow:none;">&times;</button>
            </div>
            
            <!-- Edit Preview Bar -->
            <div id="editPreviewBar" style="display:none; justify-content:space-between; align-items:center; background:var(--bg-color); padding:8px 16px; border-top:1px solid var(--border-color); border-bottom:1px solid var(--border-color); font-size:12px;">
                <div style="display:flex; flex-direction:column; min-width:0; flex:1; border-left:3px solid var(--whatsapp-green); padding-left:8px;">
                    <span style="font-weight:600; color:var(--whatsapp-green);">Editing Message</span>
                    <span id="editSnippet" style="color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Wrong message</span>
                </div>
                <button onclick="cancelEdit()" style="background:none; border:none; font-size:18px; color:var(--text-muted); cursor:pointer; width:auto; padding:0 4px; font-weight:bold; box-shadow:none;">&times;</button>
            </div>

            <!-- Emoji Picker -->
            <div id="emojiPicker" class="emoji-picker" style="display:none;">
                <div class="emoji-categories">
                    <span onclick="filterEmojis('smileys')" title="Smileys & Emotion">рЯША</span>
                    <span onclick="filterEmojis('animals')" title="Animals & Nature">рЯР±</span>
                    <span onclick="filterEmojis('food')" title="Food & Drink">рЯНО</span>
                    <span onclick="filterEmojis('activities')" title="Activities">вЪљ</span>
                    <span onclick="filterEmojis('travel')" title="Travel & Places">рЯЪЧ</span>
                    <span onclick="filterEmojis('objects')" title="Objects">рЯТ°</span>
                    <span onclick="filterEmojis('symbols')" title="Symbols">вЭ§пЄП</span>
                </div>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>

            <div id="chatInputArea" style="display:none; flex-direction:column; gap:8px; padding: 10px 14px;">
                <textarea id="chatMessage" placeholder="Type a message..."
                    onkeydown="handleKeyDown(event)" oninput="handleTypingInput()" autocomplete="off" enterkeyhint="send" rows="1"></textarea>

                <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                    <div style="display:flex; gap:8px; align-items:center;">
                        <button onclick="toggleEmojiPicker()" class="media-btn" id="emojiBtn" title="Emojis">рЯША</button>
                        <input type="file" id="mediaInput" accept="image/*,audio/*,video/*" style="display:none;"
                            onchange="handleMediaUpload(event)">
                        <button onclick="document.getElementById('mediaInput').click()" class="media-btn" title="Attach file">&#128206;</button>
                        <button onclick="startAudioRecording()" id="micBtn" class="media-btn" title="Voice message">&#127908;</button>
                    </div>
                    <button onclick="sendMessage()" id="sendBtn" style="width:auto; padding:8px 20px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let replyingToMessageId = null;
        let editingMessageId = null;

        function esc(str) {
            if (!str) return '';
            return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function sendFriendRequest(receiverEmail, btnElement) {
            if (btnElement) {
                btnElement.disabled = true;
                btnElement.innerText = "Sending...";
            }
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/request.send', {}, JSON.stringify({ receiverEmail: receiverEmail }));
                if (btnElement) btnElement.innerText = "Sent";
            } else {
                alert('WebSocket not connected. Please try again.');
                if (btnElement) {
                    btnElement.disabled = false;
                    btnElement.innerText = "Add Friend";
                }
            }
        }

        function updateNotificationBadge() {
            fetch('/api/request/pending')
                .then(res => res.json())
                .then(data => {
                    let badge = document.getElementById('notifBadge');
                    if (data && data.length > 0) {
                        if (badge) { badge.innerText = data.length; badge.style.display = 'inline-block'; }
                    } else {
                        if (badge) badge.style.display = 'none';
                    }
                })
                .catch(err => console.error(err));
        }

        function toggleMobileSearch() {
            let box = document.querySelector('.search-box');
            box.classList.toggle('mobile-expanded');
            if (box.classList.contains('mobile-expanded')) {
                setTimeout(function() {
                    document.getElementById('navbarSearchInput').focus();
                }, 100);
            } else {
                document.getElementById('navbarSearchInput').value = '';
                navbarSearchUser();
            }
        }
        // Close mobile search when clicking outside
        document.addEventListener('click', function(e) {
            let box = document.querySelector('.search-box');
            if (box && box.classList.contains('mobile-expanded') && !box.contains(e.target)) {
                box.classList.remove('mobile-expanded');
                document.getElementById('navbarSearchInput').value = '';
                navbarSearchUser();
                // Also update notification badge count
                updateNotificationBadge();
            }
        });

        function searchUser() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let usersTab = document.getElementById("usersTab");
            let users = usersTab.getElementsByClassName("user");

            for (let i = 0; i < users.length; i++) {
                let email = users[i].getElementsByTagName("p")[0].innerText.toLowerCase();
                let name = users[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

                if (email.indexOf(input) > -1 || name.indexOf(input) > -1) {
                    users[i].style.display = "flex";
                } else {
                    users[i].style.display = "none";
                }
            }
        }

        let currentUsername = null;
        let currentChatConnectionId = null;
        let currentFriendEmail = null;
        let stompClient = null;
        let currentSubscription = null;

        let sendCounter = 0;

        function autoResizeTextarea() {
            let textarea = document.getElementById('chatMessage');
            if (!textarea) return;
            textarea.style.height = '38px';
            let newHeight = textarea.scrollHeight;
            if (newHeight > 120) {
                textarea.style.height = '120px';
                textarea.style.overflowY = 'auto';
            } else {

                textarea.style.overflowY = 'hidden';
            }

        function toggleEmojiPicker() {
            let picker = document.getElementById('emojiPicker');
            if (picker.style.display === 'none' || !picker.style.display) {
                picker.style.display = 'flex';
                let grid = document.getElementById('emojiGrid');
                if (grid.children.length === 0) {
                    filterEmojis('smileys');
                }
            } else {
                picker.style.display = 'none';
            }
        }

        function filterEmojis(category) {
            let grid = document.getElementById('emojiGrid');
            grid.innerHTML = '';
            let emojis = emojiMap[category] || [];
            emojis.forEach(emoji => {
                let span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = emoji;
                span.onclick = function(e) {
                    e.stopPropagation();
                    insertEmoji(emoji);
                };
                grid.appendChild(span);
            });
        }

        // Close emoji picker on click outside
        document.addEventListener('click', function(e) {
            let picker = document.getElementById('emojiPicker');
            let btn = document.getElementById('emojiBtn');
            if (picker && picker.style.display === 'flex') {
                if (!picker.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
                    picker.style.display = 'none';
                }
            }
        });

        function insertEmoji(emoji) {
            let textarea = document.getElementById('chatMessage');
            let startPos = textarea.selectionStart;
            let endPos = textarea.selectionEnd;
            let text = textarea.value;
            textarea.value = text.substring(0, startPos) + emoji + text.substring(endPos);
            
            let newCursorPos = startPos + emoji.length;
            textarea.selectionStart = textarea.selectionEnd = newCursorPos;
            textarea.focus();
            
            autoResizeTextarea();
            handleTypingInput();
        }

        function handleTypingInput() {
            autoResizeTextarea();
            if (!currentChatConnectionId || !stompClient || !stompClient.connected) return;

            if (!isCurrentlyTyping) {
                isCurrentlyTyping = true;
                stompClient.send('/app/chat.typing', {}, JSON.stringify({
                    connectionId: currentChatConnectionId,
                    isTyping: true
                }));
            }

            if (typingTimeoutId) {
                clearTimeout(typingTimeoutId);
            }

            typingTimeoutId = setTimeout(function() {
                isCurrentlyTyping = false;
                if (stompClient && stompClient.connected) {
                    stompClient.send('/app/chat.typing', {}, JSON.stringify({
                        connectionId: currentChatConnectionId,
                        isTyping: false
                    }));
                }
            }, 1500);
        }

        function navbarSearchUser() {
            let query = document.getElementById('navbarSearchInput').value.trim();
            backToContacts();
            showTab('users');
            
            let url = query === "" ? '/active-users' : '/api/users/search?query=' + encodeURIComponent(query);
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    let userList = document.getElementById("userList");
                    userList.innerHTML = '';
                    let addedUsers = 0;
                    let statusPromises = [];
                    data.forEach(user => {
                        let email = user.useremail || 'No email';
                        if (email !== 'No email' && email !== currentUserEmail) {
                            statusPromises.push(
                                fetch('/api/user/status/' + encodeURIComponent(email))
                                    .then(res => res.json())
                                    .then(s => ({ email, isOnline: s.isOnline }))
                                    .catch(() => ({ email, isOnline: false }))
                            );
                        }
                    });
                    Promise.all(statusPromises).then(statuses => {
                        let statusMap = {};
                        statuses.forEach(s => { statusMap[s.email] = s.isOnline; });
                        data.forEach(user => {
                            let username = user.username || 'Unknown';
                            let email = user.useremail || 'No email';
                            
                            if (email !== 'No email' && email === currentUserEmail) return;
                            if (currentUsername && username !== 'Unknown' && username === currentUsername) return;
                            if (username === currentUserEmail) return;

                            addedUsers++;
                            let profileInitial = username.charAt(0).toUpperCase();
                            let isOnline = statusMap[email] || false;
                            let statusColor = isOnline ? 'var(--whatsapp-green)' : 'var(--text-muted)';

                            let userHtml = `
                                <div class="user" data-email="${esc(email)}">
                                    <div style="display:flex; align-items:center; flex:1; min-width:0;">
                                        <div class="profile-wrapper">
                                            <div class="profile" style="background: ${isOnline ? '' : 'var(--text-muted)'}">${esc(username)}</div>
                                            <span class="online-dot" style="display: block; background: ${statusColor};"></span>
                                        </div>
                                        <div class="details">
                                            <h3>${esc(username)}</h3>
                                            <p class="status-text" style="color: ${statusColor}; font-size: 11px;">${isOnline ? 'online' : 'offline'}</p>
                                        </div>
                                    </div>
                                    <button id="addBtn-${esc(email)}" onclick="sendFriendRequest('${esc(email)}', this)" class="add-friend-btn">Add Friend</button>
                                </div>
                            `;
                            userList.innerHTML += userHtml;
                        });
                        if (addedUsers === 0) {
                            userList.innerHTML = '<p style="text-align:center; padding:20px; color: var(--text-secondary);">No users found matching your search.</p>';
                        }
                    });
                })
                .catch(err => console.error('Error in search:', err));
        }

            // Update All Users tab items
            document.querySelectorAll('#userList .user[data-email]').forEach(function(el) {

                    if (dot) {

                        statusP.innerText = statusText;
                        statusP.style.color = statusColor;
                    }
                    if (avatar) {
                        avatar.style.background = isOnline ? '' : 'var(--text-muted)';
                    }
                }
            });

            // Update friend list items
            document.querySelectorAll('#friendList .user[data-email]').forEach(function(el) {
                if (el.getAttribute('data-email') === email) {
                    let dot = el.querySelector('.online-dot');
                    let statusP = el.querySelector('p.status-text');
                    let avatar = el.querySelector('.profile');
                    if (dot) {
                        dot.style.background = statusColor;

                    if (statusP) {

                        statusP.style.color = statusColor;
                    }
                    if (avatar) {
                        avatar.style.background = isOnline ? '' : 'var(--text-muted)';

                }
            });

            // Update current chat header if chatting with this user
            if (currentFriendEmail === email) {
                let el = document.getElementById('friendStatus');
                if (el) {
                    if (isOnline) {
                        el.innerHTML = '<span style="color: var(--whatsapp-green); font-weight: 600;">Online</span>';

                        let d = new Date(lastSeen);
