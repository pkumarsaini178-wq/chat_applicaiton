<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body {
            background: var(--bg-color);
            display: block;
            padding: 40px 20px;
        }
        .notif-container {
            max-width: 560px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            text-decoration: none;
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .back-link:hover {
            color: var(--primary-dark);
            transform: translateX(-2px);
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h2 {
            text-align: left;
            margin-bottom: 4px;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .notification-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s ease;
        }
        .notification-card:hover {
            box-shadow: var(--card-shadow);
        }
        .notif-info h4 {
            margin: 0;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
        }
        .notif-info p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .notif-info p b {
            color: var(--text-main);
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            width: auto;
        }
        .btn-accept {
            background: var(--success-light);
            color: #00a86b;
        }
        .btn-accept:hover {
            background: var(--success);
            color: #fff;
            transform: none;
        }
        .btn-reject {
            background: var(--danger-light);
            color: var(--danger);
        }
        .btn-reject:hover {
            background: var(--danger);
            color: #fff;
            transform: none;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        .empty-state p {
            color: var(--text-secondary);
            font-size: 15px;
            margin: 0;
        }
        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }
            .notif-container {
                max-width: 100%;
            }
            .notification-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 14px 16px;
            }
            .btn-group {
                width: 100%;
                justify-content: stretch;
            }
            .btn-group .btn {
                flex: 1;
                text-align: center;
                padding: 10px 12px;
                font-size: 14px;
            }
            .page-header h2 {
                font-size: 20px;
            }
            .empty-state {
                padding: 40px 16px;
            }
            .empty-state .icon {
                font-size: 36px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 16px 8px;
            }
            .notification-card {
                padding: 12px 14px;
            }
            .notif-info h4 {
                font-size: 14px;
            }
            .notif-info p {
                font-size: 12px;
            }
            .back-link {
                font-size: 13px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="notif-container">
        <a href="homepage.html" class="back-link">&#8592; Back to Chats</a>

        <div class="page-header">
            <h2 style="text-align: left; font-weight: 700;">Notifications</h2>
            <p>Friend requests and updates</p>
        </div>

        <div id="notificationsContainer">
            <p style="color: var(--text-secondary);">Loading notifications...</p>
        </div>
    </div>

    <script>
        let currentUserEmail = null;
        let stompClient = null;

        function connectNotificationWebSocket() {
            let socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, function (frame) {
                if (currentUserEmail) {
                    stompClient.subscribe('/topic/notifications/' + currentUserEmail, function (payload) {
                        let data = JSON.parse(payload.body);
                        if (data.type === 'FRIEND_REQUEST') {
                            loadNotifications();
                        } else if (data.type === 'REQUEST_ACCEPTED') {
                            loadNotifications();
                        }
                    });
                    stompClient.subscribe('/topic/request.confirm/' + currentUserEmail, function (payload) {
                        let data = JSON.parse(payload.body);
                        if (data.type === 'REQUEST_CONFIRM') {
                            if (data.status === 'SUCCESS') {
                                loadNotifications();
                            } else {
                                alert(data.message || 'Operation failed');
                            }
                        }
                    });
                }
            }, function (error) {
                console.error('Notification WebSocket error:', error);
                setTimeout(connectNotificationWebSocket, 5000);
            });
        }

        function esc(str) { if (!str) return ''; return String(str).replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function loadNotifications() {
            fetch('/api/request/pending')
                .then(res => res.json())
                .then(data => {
                    let container = document.getElementById('notificationsContainer');
                    container.innerHTML = '';
                    if (data.length > 0) {
                        data.forEach(req => {
                            container.innerHTML += `
                                <div class="notification-card">
                                    <div class="notif-info">
                                        <h4>Friend Request</h4>
                                        <p>From: <b>${esc(req.senderEmail)}</b></p>
                                    </div>
                                    <div class="btn-group">
                                        <button class="btn btn-accept" onclick="acceptRequest(${req.id})">Accept</button>
                                        <button class="btn btn-reject" onclick="rejectRequest(${req.id})">Reject</button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">&#128172;</div>
                                <p>No pending requests.</p>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    document.getElementById('notificationsContainer').innerHTML = '<p style="color: var(--danger);">Failed to load notifications.</p>';
                });
        }

        function acceptRequest(id) {
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/request.accept', {}, JSON.stringify({ notificationId: id }));
            } else {
                alert('WebSocket not connected. Please refresh the page.');
            }
        }

        function rejectRequest(id) {
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/request.reject', {}, JSON.stringify({ notificationId: id }));
            } else {
                alert('WebSocket not connected. Please refresh the page.');
            }
        }

        window.onload = function() {
            fetch('/api/current-user')
                .then(res => res.json())
                .then(userMap => {
                    if (userMap.email) {
                        currentUserEmail = userMap.email;
                        connectNotificationWebSocket();
                    }
                });
            loadNotifications();
        };
    </script>
</body>
</html>
