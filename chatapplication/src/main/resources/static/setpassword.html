<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .container { text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        form { text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-logo">&#10024; ChatApp</div>
        <div style="margin-bottom: 24px;"></div>
        <h2>Set New Password</h2>
        <p>Choose a strong password for your account.</p>
        <div id="error-message" class="error"></div>
        <form action="/setpassword" method="POST">
            <input type="hidden" name="email" id="email-field" required>

            <label for="password">New Password</label>
            <input type="password" name="password" id="password" placeholder="Enter new password" required>

            <label for="currentpassword">Confirm Password</label>
            <input type="password" name="currentpassword" id="currentpassword" placeholder="Confirm new password" required>

            <button type="submit">Reset Password</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="login.html" style="color: var(--text-muted); font-size: 14px; text-decoration: none;">Back to Sign In</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const error = urlParams.get('error');

        if (email) {
            document.getElementById('email-field').value = email;
        } else {
            window.location.href = '/forgetpassword.html';
        }

        if (error) {
            document.getElementById('error-message').innerText = error;
        }
    </script>
</body>
</html>
