<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .container {
            text-align: center;
        }
        .app-logo {
            font-size: 38px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .app-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        form {
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-logo">&#10024; ChatApp</div>
        <p class="app-subtitle">Create your account</p>

        <form action="/siginpage" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="user_name" placeholder="Choose a username" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="user_email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="passowrd" placeholder="Create a password" required>

            <label for="confirmpass">Confirm Password</label>
            <input type="password" id="confirmpass" name="current_password" placeholder="Confirm your password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="error" id="errorMessage"></div>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        fetch('/api/current-user')
            .then(res => {
                if (res.ok) return res.json();
                throw new Error('Not authenticated');
            })
            .then(userMap => {
                if (userMap.email) {
                    window.location.href = '/homepage.html';
                }
            })
            .catch(err => {
                console.log('Not logged in:', err.message);
            });

        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        if (error) {
            document.getElementById("errorMessage").innerText = error;
        }
    </script>
</body>

</html>
