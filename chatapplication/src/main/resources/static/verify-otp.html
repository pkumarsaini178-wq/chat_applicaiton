<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="theme.css">
    <style>
        .container { text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        form { text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-logo">&#10024; ChatApp</div>
        <div style="margin-bottom: 24px;"></div>
        <h2>Verify OTP</h2>
        <p>Enter the 6-digit code sent to your email.</p>
        <div id="error-message" class="error"></div>
        <form action="/verify-otp" method="POST">
            <input type="hidden" name="email" id="email-field" required>
            <label for="otp">OTP Code</label>
            <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
            <button type="submit">Verify</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="forgetpassword.html" style="color: var(--text-muted); font-size: 14px; text-decoration: none;">Resend OTP</a>
        </div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const error = urlParams.get('error');

        if (email) {
            document.getElementById('email-field').value = email;
        } else {
            window.location.href = '/forgetpassword.html';
        }

        if (error) {
            document.getElementById('error-message').innerText = error;
        }
    </script>
</body>
</html>
