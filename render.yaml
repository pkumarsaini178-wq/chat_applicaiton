databases:
  # 1. PostgreSQL Database
  - name: chat-db
    plan: free # Can be upgraded to starter/standard
    ipAllowList: [] # Allow all IPs

services:
  # 2. Spring Boot Web Service (via Docker)
  - type: web
    name: chat-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: chat-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: chat-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: chat-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: chat-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: chat-db
          property: password
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false # Set this manually in the Render Dashboard
      - key: MAIL_PASSWORD
        sync: false # Set this manually in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a strong secret
      - key: CHAT_ENCRYPTION_KEY
        generateValue: true
      - key: TZ
        value: Asia/Kolkata
